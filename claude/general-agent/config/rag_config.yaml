# RAG 配置文件
rag:
  enabled: true
  auto_mode: false  # 自动检测模式（初期关闭，避免误触发）

  # 向量存储配置
  vector_store:
    type: "chromadb"  # chromadb | faiss (未来扩展)
    path: "data/rag/vector_db"
    collection_name: "general_agent_docs"

  # 嵌入模型配置
  embedding:
    provider: "bge"  # bge | multilingual (未来扩展)
    model: "BAAI/bge-base-zh-v1.5"
    dimension: 768
    device: "cpu"  # cpu | cuda
    batch_size: 32
    normalize: true

  # 文档分块配置
  chunking:
    strategy: "hybrid"  # fixed | semantic | hybrid
    max_size: 512       # 最大块大小（tokens）
    min_size: 100       # 最小块大小（tokens）
    overlap: 50         # 重叠大小（tokens）

    # 语义分块特定配置
    semantic:
      markdown_max_heading_level: 3  # Markdown 最大标题层级
      preserve_code_blocks: true     # 保持代码块完整
      preserve_tables: true           # 保持表格完整

  # 检索配置
  retrieval:
    top_k: 5                    # 返回结果数量
    similarity_threshold: 0.7   # 相似度阈值
    max_context_tokens: 2000    # 最大上下文 tokens
    enable_metadata_filter: true # 启用元数据过滤

  # 索引配置
  indexing:
    batch_size: 100       # 批量处理大小
    show_progress: true   # 显示进度条
    recursive: true       # 递归处理子目录
    supported_extensions: # 支持的文件扩展名
      - ".md"
      - ".txt"
      - ".pdf"

  # 路由配置
  routing:
    explicit_syntax: true   # 支持 @rag: 显式语法
    auto_detection: false   # 自动检测（初期关闭）

    # 自动检测规则（预留）
    auto_rules:
      question_words: true      # 疑问词检测
      knowledge_keywords: true  # 知识关键词检测
      similarity_check: true    # 相似度检查
      min_similarity: 0.6       # 最低相似度阈值

  # 审计日志配置
  audit:
    enabled: true       # 启用审计日志
    log_queries: true   # 记录查询
    log_results: true   # 记录结果
